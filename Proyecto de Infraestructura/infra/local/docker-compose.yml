services:
  # DynamoDB Local: base de datos en tu máquina, compatible con AWS DynamoDB
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: patentes-dynamodb-local
    # Corre como root para poder escribir el archivo SQLite en el volumen
    # (sin esto: "SQLiteException: unable to open database file").
    user: root
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

  # UI web opcional para inspeccionar las tablas (http://localhost:8001)
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: patentes-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      - dynamodb-local

volumes:
  dynamodb-data:
